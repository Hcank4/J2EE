<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container py-4">
    <h2 class="mb-4">Các học phần tôi đã đăng ký</h2>

    <div class="row g-4" th:if="${!#lists.isEmpty(enrollments)}">
        <div class="col-md-6 col-lg-4" th:each="enrollment : ${enrollments}">
            <div class="card shadow-sm h-100">
                <img th:src="${enrollment.course.image}" class="card-img-top" style="height: 200px; object-fit: cover;" alt="course image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${enrollment.course.name}"></h5>
                    <p><strong>Tín chỉ:</strong> <span th:text="${enrollment.course.credits}"></span></p>
                    <p><strong>Giảng viên:</strong> <span th:text="${enrollment.course.lecturer}"></span></p>
                    <p><strong>Ngày đăng ký:</strong> <span th:text="${#temporals.format(enrollment.enrollDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-info">
        Bạn chưa đăng ký học phần nào.
    </div>
</div>
</body>
</html>
