<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home - Course Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container py-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Danh sách học phần</h2>
        <p class="text-muted">Mỗi trang hiển thị 5 học phần</p>
    </div>

    <div th:if="${param.success}" class="alert alert-success" th:text="${param.success}"></div>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="course : ${coursePage.content}">
            <div class="card h-100 shadow-sm">
                <img th:src="${course.image}" class="card-img-top course-img" alt="course image">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${course.name}"></h5>
                    <p class="mb-1"><strong>Tín chỉ:</strong> <span th:text="${course.credits}"></span></p>
                    <p class="mb-2"><strong>Giảng viên:</strong> <span th:text="${course.lecturer}"></span></p>
                    <p class="mb-3"><strong>Danh mục:</strong> <span th:text="${course.category != null ? course.category.name : 'Không có'}"></span></p>

                    <form sec:authorize="hasRole('STUDENT')" th:action="@{'/enroll/' + ${course.id}}" method="post" class="mt-auto">
                        <button type="submit" class="btn btn-primary w-100">Enroll</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <nav class="mt-4" th:if="${coursePage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, coursePage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
