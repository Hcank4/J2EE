<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="mb-4" th:text="${course.id == null ? 'Thêm học phần' : 'Cập nhật học phần'}"></h3>

                    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Tên học phần</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Link hình ảnh</label>
                            <input type="text" th:field="*{image}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số tín chỉ</label>
                            <input type="number" th:field="*{credits}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giảng viên</label>
                            <input type="text" th:field="*{lecturer}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select name="categoryId" class="form-select">
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:text="${category.name}"
                                        th:selected="${course.category != null and category.id == course.category.id}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">Lưu</button>
                        <a th:href="@{/admin/courses}" class="btn btn-secondary">Quay lại</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
