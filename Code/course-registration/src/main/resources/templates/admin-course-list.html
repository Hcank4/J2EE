<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Course</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Quản lý học phần</h2>
        <a th:href="@{/admin/courses/create}" class="btn btn-success">+ Thêm Course</a>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên học phần</th>
                <th>Ảnh</th>
                <th>Tín chỉ</th>
                <th>Giảng viên</th>
                <th>Danh mục</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.name}"></td>
                <td>
                    <img th:src="${course.image}" width="100" alt="image">
                </td>
                <td th:text="${course.credits}"></td>
                <td th:text="${course.lecturer}"></td>
                <td th:text="${course.category != null ? course.category.name : 'Không có'}"></td>
                <td>
                    <a th:href="@{'/admin/courses/edit/' + ${course.id}}" class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{'/admin/courses/delete/' + ${course.id}}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
