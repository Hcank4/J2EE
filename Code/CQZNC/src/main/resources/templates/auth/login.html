<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Job Portal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/layout :: header"></div>
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Đăng nhập</h1>
    <p>Đăng nhập để lưu việc làm, ứng tuyển và quản lý tài khoản.</p>
    <div class="error-box" th:if="${error}" th:text="${error}">Thông báo lỗi</div>
    <form class="form-grid" th:action="@{/login}" th:object="${loginRequest}" method="post">
      <div class="form-group">
        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Nhập email" required>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" th:field="*{password}" placeholder="Nhập mật khẩu" required>
      </div>
      <button class="btn btn-primary" type="submit">Đăng nhập</button>
    </form>
  </div>
</section>
<div th:replace="fragments/layout :: footer"></div>
</body>
</html>
