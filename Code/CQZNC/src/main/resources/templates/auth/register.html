<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Job Portal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/layout :: header"></div>
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Tạo tài khoản</h1>
    <p>Tạo tài khoản ứng viên hoặc nhà tuyển dụng để sử dụng hệ thống.</p>
    <div class="error-box" th:if="${error}" th:text="${error}">Thông báo lỗi</div>
    <form class="form-grid" th:action="@{/register}" th:object="${registerRequest}" method="post">
      <div class="form-group">
        <label>Họ và tên</label>
        <input type="text" th:field="*{fullname}" placeholder="Nhập họ và tên" required>
      </div>
      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="text" th:field="*{mobile}" placeholder="Nhập số điện thoại" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="Nhập email" required>
      </div>
      <div class="form-group">
        <label>Vai trò</label>
        <select th:field="*{role}">
          <option value="user">Ứng viên</option>
          <option value="employer">Nhà tuyển dụng</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tên công ty <span class="hint">(nếu là nhà tuyển dụng)</span></label>
        <input type="text" th:field="*{companyName}" placeholder="Nhập tên công ty">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" th:field="*{password}" placeholder="Nhập mật khẩu" required>
      </div>
      <button class="btn btn-primary" type="submit">Đăng ký tài khoản</button>
    </form>
  </div>
</section>
<div th:replace="fragments/layout :: footer"></div>
</body>
</html>
