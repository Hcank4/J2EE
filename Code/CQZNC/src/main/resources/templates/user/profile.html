<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ho so ung vien</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/layout :: header"></div>
<section class="auth-wrap">
  <div class="auth-card profile-card">
    <h1>Ho so ung vien</h1>
    <p class="section-sub">Cap nhat thong tin ca nhan va quan ly toi da 3 CV.</p>

    <form method="post" enctype="multipart/form-data" class="form-grid">
      <div class="avatar-editor">
        <img class="avatar-preview"
             th:if="${user.image != null and !#strings.isEmpty(user.image)}"
             th:src="@{'/uploads/avatars/' + ${user.image}}"
             alt="Anh dai dien">
        <div class="avatar-fallback"
             th:if="${user.image == null or #strings.isEmpty(user.image)}"
             th:text="${user.fullname != null and !#strings.isEmpty(user.fullname) ? #strings.substring(user.fullname,0,1) : 'U'}">U</div>
        <div class="form-group" style="margin:0">
          <label for="avatarFile">Anh dai dien</label>
          <input id="avatarFile" type="file" name="avatarFile" accept="image/*">
        </div>
      </div>

      <div class="profile-grid">
        <div class="dashboard-card profile-panel">
          <h3>Thong tin co ban</h3>
          <div class="form-group"><label>Ho ten</label><input name="fullname" th:value="${user.fullname}" placeholder="Ho ten"></div>
          <div class="form-group"><label>Email</label><input th:value="${user.email}" disabled></div>
          <div class="form-group"><label>So dien thoai</label><input name="mobile" th:value="${user.mobile}" placeholder="So dien thoai"></div>
        </div>

        <div class="dashboard-card profile-panel">
          <h3>Dia chi lien he</h3>
          <div class="form-group"><label>Tinh/Thanh</label><input name="province" th:value="${user.province}" placeholder="Tinh/Thanh"></div>
          <div class="form-group"><label>Quan/Huyen</label><input name="district" th:value="${user.district}" placeholder="Quan/Huyen"></div>
          <div class="form-group"><label>Phuong/Xa</label><input name="wards" th:value="${user.wards}" placeholder="Phuong/Xa"></div>
          <div class="form-group"><label>Dia chi chi tiet</label><input name="locationDetail" th:value="${user.locationDetail}" placeholder="So nha, duong..."></div>
        </div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" type="submit">Luu ho so</button>
        <a class="btn btn-outline" th:href="@{/user}">Quay lai dashboard</a>
      </div>
    </form>

    <div class="dashboard-card" style="margin-top:20px">
      <h3>Thu vien CV (toi da 3 file)</h3>

      <form th:action="@{/user/profile/cv}" method="post" enctype="multipart/form-data" class="form-grid">
        <div class="form-group">
          <label for="cvFile"><strong>Tai CV moi</strong></label>
          <input id="cvFile" type="file" name="cvFile" accept=".pdf,.doc,.docx" th:disabled="${cvItems != null and #lists.size(cvItems) >= 3}">
        </div>
        <button type="submit" class="btn btn-primary" th:disabled="${cvItems != null and #lists.size(cvItems) >= 3}">Tai len CV</button>
      </form>

      <div class="empty-box" th:if="${cvItems == null or #lists.isEmpty(cvItems)}">Ban chua tai CV nao.</div>
      <table class="simple-table" th:if="${cvItems != null and !#lists.isEmpty(cvItems)}">
        <tr>
          <th>Ten CV</th>
          <th>Hanh dong</th>
        </tr>
        <tr th:each="cv : ${cvItems}">
          <td th:text="${cv.displayName}">CV</td>
          <td style="display:flex;gap:8px;flex-wrap:wrap">
            <a class="btn btn-outline" th:href="${cv.publicUrl}" target="_blank">Xem</a>
            <form th:action="@{/user/profile/cv/delete}" method="post" style="margin:0">
              <input type="hidden" name="cvName" th:value="${cv.storedName}">
              <button class="btn btn-outline" type="submit">Xoa</button>
            </form>
          </td>
        </tr>
      </table>
    </div>
  </div>
</section>
<div th:replace="fragments/layout :: footer"></div>
</body>
</html>
