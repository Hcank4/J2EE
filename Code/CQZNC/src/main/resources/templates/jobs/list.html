<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách việc làm - Job Portal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/layout :: header"></div>
<section class="page-wrap">
  <div class="container list-layout">
    <aside class="panel">
      <h3>Tìm kiếm việc làm</h3>
      <form class="filter-grid" th:action="@{/jobs}" method="get">
        <input type="text" name="keyword" th:value="${param.keyword}" placeholder="Từ khóa">
        <input type="text" name="province" th:value="${param.province}" placeholder="Tỉnh / thành phố">
        <select name="careerId">
          <option value="">Tất cả ngành nghề</option>
          <option th:each="career : ${careers}" th:value="${career.id}" th:text="${career.name}" th:selected="${careerId != null and careerId == career.id}"></option>
        </select>
        <select name="jobTypeId">
          <option value="">Tất cả loại hình</option>
          <option th:each="jobType : ${jobTypes}" th:value="${jobType.id}" th:text="${jobType.name}" th:selected="${jobTypeId != null and jobTypeId == jobType.id}"></option>
        </select>
        <button class="btn btn-primary" type="submit">Tìm kiếm</button>
      </form>
    </aside>
    <div>
      <div class="section-head">
        <div>
          <h1 class="section-title">Danh sách việc làm</h1>
          <p class="section-sub">Tìm công việc phù hợp với kỹ năng và vị trí mong muốn của bạn.</p>
        </div>
      </div>
      <div class="list-jobs" th:if="${jobs != null and !#lists.isEmpty(jobs)}">
        <div class="job-card job-row" th:each="job : ${jobs}">
          <div>
            <h3 th:text="${job.title}">Tên công việc</h3>
            <p th:text="${job.companyName}">Công ty</p>
            <div class="meta">
              <span th:text="${job.province != null ? job.province : 'Đang cập nhật'}"></span>
              <span th:text="${job.experience != null ? job.experience : 'Không yêu cầu'}"></span>
            </div>
          </div>
          <div>
            <div class="salary" th:text="${job.salary != null ? job.salary : 'Thỏa thuận'}"></div>
            <div style="margin-top:12px"><a class="btn btn-outline" th:href="@{/jobs/{id}(id=${job.id})}">Xem chi tiết</a></div>
          </div>
        </div>
      </div>
      <div class="empty-box" th:if="${jobs == null or #lists.isEmpty(jobs)}">Không tìm thấy việc làm phù hợp.</div>
    </div>
  </div>
</section>
<div th:replace="fragments/layout :: footer"></div>
</body>
</html>
