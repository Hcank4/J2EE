<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px;">
        <div>
            <a class="navbar-brand" th:href="@{/products}">Home</a>
            <a class="navbar-brand" th:href="@{/products}">Products</a>
            <a class="navbar-brand" th:href="@{/cart}">Cart (<span th:text="${cartCount}">0</span>)</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <h2 class="mb-3">Giỏ hàng</h2>

    <table class="table table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Sản phẩm</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
            <th>Xóa</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(cart)}">
            <td colspan="5" class="text-center">Giỏ hàng đang trống</td>
        </tr>
        <tr th:each="item : ${cart}">
            <td>
                <div class="d-flex align-items-center gap-3">
                    <img th:if="${item.image != null and !#strings.isEmpty(item.image)}" th:src="${item.image}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 8px;">
                    <span th:text="${item.name}"></span>
                </div>
            </td>
            <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td>
                <form th:action="@{/cart/update}" method="post" class="d-flex gap-2">
                    <input type="hidden" name="id" th:value="${item.id}">
                    <input type="number" name="quantity" min="1" class="form-control" style="max-width: 90px;" th:value="${item.quantity}">
                    <button class="btn btn-primary btn-sm" type="submit">Cập nhật</button>
                </form>
            </td>
            <td th:text="${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td>
                <a th:href="@{/cart/remove/{id}(id=${item.id})}" class="btn btn-danger btn-sm">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center">
        <h4>Tổng tiền: <span class="text-danger" th:text="${#numbers.formatDecimal(totalMoney, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></h4>
        <div class="d-flex gap-2">
            <a href="/products" class="btn btn-secondary">Tiếp tục mua</a>
            <a href="/cart/clear" class="btn btn-outline-danger">Xóa tất cả</a>
            <a href="/order/checkout" class="btn btn-success" th:if="${!#lists.isEmpty(cart)}">Đặt hàng</a>
        </div>
    </div>
</div>
</body>
</html>
