<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px; padding-right: 40px;">
        <div class="d-flex w-100 justify-content-between align-items-center">
            <div>
                <a class="navbar-brand" th:href="@{/products}">Home</a>
                <a class="navbar-brand" th:href="@{/products}">Products</a>
                <a class="navbar-brand" th:href="@{/cart}">Cart (<span th:text="${cartCount}">0</span>)</a>
            </div>

            <div class="d-flex align-items-center text-white" sec:authorize="isAuthenticated()">
                <span class="me-3">
                    Chào, <strong sec:authentication="name">User</strong>
                    [<span sec:authentication="principal.authorities">Role</span>]
                </span>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Danh sách sản phẩm</h2>
        <a th:href="@{/products/add}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Thêm sản phẩm</a>
    </div>

    <form th:action="@{/products}" method="get" class="row g-2 mb-3">
        <div class="col-md-8">
            <input type="text" name="keyword" class="form-control" placeholder="Nhập tên sản phẩm để tìm kiếm" th:value="${keyword}">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">Tìm kiếm</button>
        </div>
        <div class="col-md-2">
            <a th:href="@{/products}" class="btn btn-secondary w-100">Làm mới</a>
        </div>
    </form>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Tên</th>
            <th>Ảnh</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Danh mục</th>
            <th>Mô tả</th>
            <th>Giỏ hàng</th>
            <th sec:authorize="hasRole('ADMIN')">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="9" class="text-center">Không có sản phẩm nào</td>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}" th:src="${product.image}" alt="Ảnh sản phẩm" style="max-width: 100px; height: auto; border-radius: 5px;">
                <span th:if="${product.image == null or #strings.isEmpty(product.image)}">Không có ảnh</span>
            </td>
            <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td th:text="${product.quantity}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td th:text="${product.description}"></td>
            <td>
                <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-success btn-sm">Add to cart</a>
            </td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 0}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage - 1}, size=${pageSize}, keyword=${keyword})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/products(page=${i}, size=${pageSize}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage + 1}, size=${pageSize}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
