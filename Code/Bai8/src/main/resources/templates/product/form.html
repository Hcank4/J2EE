<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Cập nhật sản phẩm' : 'Thêm sản phẩm'">Form sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px">
        <div>
            <a class="navbar-brand" th:href="@{/products}">Home</a>
            <a class="navbar-brand" th:href="@{/products}">Products</a>
            <a class="navbar-brand" th:href="@{/cart}">Cart</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4" th:text="${isEdit} ? 'Cập nhật sản phẩm' : 'Thêm sản phẩm mới'"></h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" class="border p-4 rounded shadow-sm">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input type="text" class="form-control" th:field="*{name}">
            <small class="text-danger" th:errors="*{name}"></small>
        </div>

        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" class="form-control" th:field="*{image}">
            <small class="text-danger" th:errors="*{image}"></small>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Giá</label>
                <input type="number" class="form-control" th:field="*{price}">
                <small class="text-danger" th:errors="*{price}"></small>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Số lượng</label>
                <input type="number" class="form-control" th:field="*{quantity}">
                <small class="text-danger" th:errors="*{quantity}"></small>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Danh mục</label>
            <select class="form-select" th:field="*{category.id}">
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
        </div>

        <button type="submit" class="btn btn-success" th:text="${isEdit} ? 'Cập nhật' : 'Thêm sản phẩm'"></button>
        <a href="/products" class="btn btn-secondary ms-2">Quay lại</a>
    </form>
</div>
</body>
</html>
