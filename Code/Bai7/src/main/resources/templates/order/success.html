<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-success">
        <h3>Đặt hàng thành công</h3>
        <p>Cảm ơn bạn. Đơn hàng của bạn đã được lưu.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <p><strong>Mã đơn hàng:</strong> <span th:text="${order.id}"></span></p>
            <p><strong>Khách hàng:</strong> <span th:text="${order.customerName}"></span></p>
            <p><strong>Số điện thoại:</strong> <span th:text="${order.phone}"></span></p>
            <p><strong>Địa chỉ:</strong> <span th:text="${order.address}"></span></p>
            <p><strong>Tổng tiền:</strong> <span class="text-danger" th:text="${#numbers.formatDecimal(order.totalMoney, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></p>
        </div>
    </div>

    <a href="/products" class="btn btn-primary mt-3">Quay về trang sản phẩm</a>
</div>
</body>
</html>
