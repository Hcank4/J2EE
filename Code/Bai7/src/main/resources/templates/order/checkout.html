<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <h2 class="mb-3">Thông tin đặt hàng</h2>

    <div class="row">
        <div class="col-md-7">
            <form th:action="@{/order/place}" method="post" class="border rounded p-4 shadow-sm">
                <div class="mb-3">
                    <label class="form-label">Họ tên khách hàng</label>
                    <input type="text" name="customerName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Địa chỉ nhận hàng</label>
                    <textarea name="address" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-success">Xác nhận đặt hàng</button>
                <a href="/cart" class="btn btn-secondary ms-2">Quay lại giỏ hàng</a>
            </form>
        </div>
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">Sản phẩm đã chọn</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between" th:each="item : ${cart}">
                        <span><span th:text="${item.name}"></span> x <span th:text="${item.quantity}"></span></span>
                        <strong th:text="${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></strong>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Tổng cộng</strong>
                        <strong class="text-danger" th:text="${#numbers.formatDecimal(totalMoney, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></strong>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
</body>
</html>
